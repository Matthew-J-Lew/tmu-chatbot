# Crawl profiles define discovery scope + policy rules.
# Add more profiles later (e.g., "science", "engineering") without changing crawler code.

profiles:
  arts:
    seeds:
      - https://www.torontomu.ca/arts/
    allowed_domains:
      - www.torontomu.ca
      - torontomu.ca
    allowed_path_prefixes:
      - /arts
      - /arts/
      - /arts-contemporary-studies
      - /arts-contemporary-studies/
    deny_path_regex:
      - ^/arts/news
      - ^/arts/events?
      - ^/arts/calendar
      - ^/arts/social
      - ^/arts/future-students/events
      - ^/arts/faculty-and-staff
      - ^/arts/research-and-innovation
      - ^/arts/alumni-and-partners
      - ^/arts/about/our-people
      - ^/arts/about/academic-plan-
      - ^/arts/undergraduate/dean-s-list
      - /search
      - /site-map
      - /sitemap
    strip_query: true
    include_pdfs: true
    max_pages: 8000
    max_depth: 6
    use_sitemaps: true

  arts_calendar:
    generated:
      kind: arts_calendar
      years_env: CRAWL_CALENDAR_ALLOWED_YEARS
      default_years:
        - 2025-2026
        - 2026-2027
    allowed_domains:
      - www.torontomu.ca
      - torontomu.ca
    seeds: []
    allowed_path_prefixes: []
    allowed_path_regex: []
    deny_path_regex: []
    strip_query: true
    include_pdfs: false
    max_pages: 2500
    max_depth: 4
    use_sitemaps: false

  tmu_core:
    seeds:
      - https://www.torontomu.ca/admissions/undergraduate/apply/
      - https://www.torontomu.ca/admissions/undergraduate/requirements/
      - https://www.torontomu.ca/student-financial-assistance/
      - https://www.torontomu.ca/student-financial-assistance/scholarships-bursaries/
      - https://www.torontomu.ca/career-coop-student-success/career-coop/
      - https://www.torontomu.ca/career-coop-student-success/career-coop/coop/
      - https://www.torontomu.ca/career-coop-student-success/career-coop/coop/co-op-programs/
      - https://www.torontomu.ca/curriculum-advising/curriculum-requirements/
      - https://www.torontomu.ca/curriculum-advising/curriculum-requirements/program-requirements/
      - https://www.torontomu.ca/current-students/course-enrolment/
      - https://www.torontomu.ca/current-students/course-enrolment/wait-list/
      - https://www.torontomu.ca/current-students/course-enrolment/course-intentions/
      - https://www.torontomu.ca/current-students/course-enrolment/drops-withdrawals/drop-course/
      - https://www.torontomu.ca/current-students/academic-consideration/
      - https://www.torontomu.ca/myservicehub-support/students/academics/
      - https://www.torontomu.ca/myservicehub-support/students/academics/advisement-report/
      - https://www.torontomu.ca/calendar/2025-2026/dates/
      - https://www.torontomu.ca/calendar/2026-2027/dates/
      - https://continuing.torontomu.ca/
    allowed_domains:
      - www.torontomu.ca
      - torontomu.ca
      - continuing.torontomu.ca
    allowed_path_prefixes:
      - /admissions/undergraduate/apply
      - /admissions/undergraduate/requirements
      - /student-financial-assistance
      - /career-coop-student-success/career-coop
      - /curriculum-advising/curriculum-requirements
      - /current-students/course-enrolment
      - /current-students/academic-consideration
      - /myservicehub-support/students/academics
      - /calendar/2025-2026/dates
      - /calendar/2026-2027/dates
      - /contentManagement.do
    deny_path_regex:
      - ^/admissions/undergraduate$
      - ^/admissions/undergraduate/(after-applying|admitted-students|decision-release-dates|denied-students|future-student-events|new-students)(?:/|$)
      - ^/admissions/undergraduate/.*/events?
      - ^/admissions/undergraduate/open-house(?:/|$)
      - ^/student-financial-assistance/.*/events?
      - ^/student-financial-assistance/news(?:/|$)
      - ^/career-coop-student-success/.*/events?
      - ^/career-coop-student-success/news(?:/|$)
      - ^/career-coop-student-success/employers(?:/|$)
      - ^/career-coop-student-success/about(?:/|$)
      - ^/search/publicCourseAdvancedSearch\.do(?:/|$)
      - /search
      - /site-map
      - /sitemap
    strip_query: true
    include_pdfs: true
    max_pages: 350
    max_depth: 2
    use_sitemaps: false
